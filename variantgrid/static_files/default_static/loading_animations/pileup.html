<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Read Pileup - preview</title>
<style>
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{
    background:#fff; color:#33424d;
    font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    display:flex; flex-direction:column;
  }
  .bar{display:flex; gap:8px; align-items:center; padding:10px 14px; border-bottom:1px solid #e2e8ee}
  .bar b{font-size:12px; letter-spacing:.12em; text-transform:uppercase; margin-right:8px}
  .bar button{
    font:inherit; font-size:12px; color:#33424d; background:#f1f4f7;
    border:1px solid #cdd6de; border-radius:7px; padding:6px 12px; cursor:pointer;
  }
  .bar button[data-on]{color:#fff; background:#1f9a87; border-color:#1f9a87; font-weight:600}
  /* The stage matches the analysis grid overlay: white background, full size. */
  #stage{flex:1; position:relative; background:#fff}
  body.darkbg #stage{background:#07090c}
</style>
</head>
<body>
  <div class="bar">
    <b>Read Pileup</b>
    <button id="m-white" data-on>Dark glyphs / white (analysis)</button>
    <button id="m-dark">Dark background</button>
    <button id="m-light">Light theme</button>
  </div>
  <div id="stage"></div>

  <script>
  // Cache-bust so edits to the loader always show on reload.
  const SCRIPTS = [
    "../js/lib/loaders/vg-loaders.js",
    "../js/lib/loaders/pileup.loader.js"
  ];
  const bust = "?t=" + Date.now();
  (function loadNext(i) {
    if (i >= SCRIPTS.length) { run(); return; }
    const s = document.createElement("script");
    s.src = SCRIPTS[i] + bust;
    s.onload = () => loadNext(i + 1);
    document.head.appendChild(s);
  })(0);

  let stopCurrent = null;
  function run() {
    const stage = document.getElementById("stage");
    // mode: how the analysis overlay uses it (dark glyphs, clear bg, over white)
    const MODES = {
      "m-white": {theme: "dark",  clearBackground: true,  darkbg: false},
      "m-dark":  {theme: "dark",  clearBackground: false, darkbg: true},
      "m-light": {theme: "light", clearBackground: false, darkbg: false}
    };
    function play(modeId) {
      if (stopCurrent) stopCurrent();
      stage.innerHTML = "";
      const m = MODES[modeId];
      document.body.classList.toggle("darkbg", m.darkbg);
      Object.keys(MODES).forEach(id =>
        document.getElementById(id).toggleAttribute("data-on", id === modeId));
      stopCurrent = VGLoaders.start("pileup", stage, {theme: m.theme, clearBackground: m.clearBackground});
    }
    Object.keys(MODES).forEach(id =>
      document.getElementById(id).addEventListener("click", () => play(id)));
    play("m-white");   // always on, defaulting to the analysis look
  }
  </script>
</body>
</html>
