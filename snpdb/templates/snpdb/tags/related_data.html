{% block related_data %}
{% endblock %}

{% if has_classifications %}
{% load static %}
{% load js_tags %}
<div>
    <script>
    function classificationFilter(data, type) {
        data.sample_ids = "{{ sample_ids_list }}";
        return data;
    }

    $(document).ready(function() {
        let vcDatatable = $('#vc-datatable');
        vcDatatable.on('draw.dt', () => {
            Flags.instance.init({userId: '{{user.id}}'});
        });
    });
    </script>

    <h3>Classifications</h3>
    <table id="vc-datatable"
           data-datatable-url="{% url 'classification_datatables' %}"
           data-datatable-data="classificationFilter"
           data-datatable-filter-count="hide"
           class="classification-table"></table>
</div>
{% endif %}
