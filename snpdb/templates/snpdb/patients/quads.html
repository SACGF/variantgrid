{% extends menu_patients_base %}
{% load static %}

{% block title %}Quads{% endblock %}
{% block submenu_page_content %}
    <H3>Quads</H3>
    <p>Create Quads <a href="{% url 'data' %}" class="hover-link">from VCFs</a> or on the <a href="{% url 'cohorts' %}" class="hover-link">cohorts page.</a></p>
    <div>
        <div id="search">
        <div id="quad-grid-filter-container"></div>
	</div>

    <div class="mb-2">
        <label><input type="checkbox" id="quad-group-data" {% if show_group_data %}checked{% endif %}> Show Group Data</label>
    </div>
    <table id="quad-grid" data-datatable-url="{% url 'quad_datatable' %}" class="sticky-header"></table>
    <script>
    $(document).ready(function() {
        $("#quad-group-data").change(function() {
            $.ajax({
                type: "POST",
                data: {grid_name: "Quads", filter_level: "groups", checked: $(this).is(":checked")},
                url: "{% url 'set_user_data_grid_config' %}",
                headers: {"X-CSRFToken": Cookies.get("csrftoken")},
                success: function() {
                    $("#quad-grid").DataTable().ajax.reload(null, false);
                }
            });
        });
    });
    </script>
{% endblock %}
