{% extends menu_patients_base %}
{% load static %}

{% block title %}Trios{% endblock %}
{% block submenu_page_content %}
    <H3>Trios</H3>
    <p>Create Trios <a href="{% url 'data' %}" class="hover-link">from VCFs</a> or on the <a href="{% url 'cohorts' %}" class="hover-link">cohorts page.</a></p>
    <div>
        <div id="search">
        <div id="trio-grid-filter-container"></div>
	</div>

    <div class="mb-2">
        <label><input type="checkbox" id="trio-group-data" {% if show_group_data %}checked{% endif %}> Show Group Data</label>
    </div>
    <table id="trio-grid" data-datatable-url="{% url 'trio_datatable' %}" class="sticky-header"></table>
    <script>
    $(document).ready(function() {
        $("#trio-group-data").change(function() {
            $.ajax({
                type: "POST",
                data: {grid_name: "Trios", filter_level: "groups", checked: $(this).is(":checked")},
                url: "{% url 'set_user_data_grid_config' %}",
                headers: {"X-CSRFToken": Cookies.get("csrftoken")},
                success: function() {
                    $("#trio-grid").DataTable().ajax.reload(null, false);
                }
            });
        });
    });
    </script>
{% endblock %}
